version: "3.9"

services:
  frontend:
    build:
      context: ./app/frontend
      dockerfile: ../../docker/Dockerfile.frontend
      target: production
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: production
    environment:
      - APP_ENV=production
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: production
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: production
    restart: unless-stopped
