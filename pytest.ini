[pytest]
# Repo root on sys.path so `import app.api...` works without exporting PYTHONPATH
pythonpath = .
testpaths = tests
asyncio_mode = auto
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
# CI can enforce thresholds, e.g.  pytest --cov-fail-under=75
addopts =
    --strict-markers
    --tb=short
    -v
    --cov=app
    --cov-report=term-missing
    --cov-report=html:coverage_html

markers =
    unit: Pure unit tests (no I/O)
    integration: Tests requiring database or Redis
    e2e: End-to-end tests requiring the full stack
    llm: Tests that make real LLM API calls (skip in CI)
    slow: Tests taking > 5 seconds

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
